services:
  - type: web
    name: fasalsaathi-backend
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: fasalsaathi-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite:////var/data/fasalsaathi_app.db
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: DATA_GOV_API_KEY
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_CHAT_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
